apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.appName }}-{{ .Values.environment }}
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-headers: |
      DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,X-CSRF-Token,
      Authorization
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, PUT, POST, DELETE, PATCH, OPTIONS
    nginx.ingress.kubernetes.io/cors-allow-origin: '*'
    nginx.ingress.kubernetes.io/enable-cors: "true"
  labels:
    app.kubernetes.io/name: "{{ .Values.appName }}-{{ .Values.environment }}"
  namespace: {{ .Values.namespace }}-{{ .Values.environment }}
spec:
  rules:
  - host: {{ .Values.ingress.hostname }}
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ .Values.appName }}-{{ .Values.environment }}
            port:
              number: {{ .Values.idgenerator.service.port }}
