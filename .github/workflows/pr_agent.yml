on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    with_help: true

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions: # Важно для записи комментариев
      pull-requests: write
      issues: write
      contents: read
    name: Run PR Agent
    steps:
      - name: PR Agent action
        uses: Codium-ai/pr-agent@main
        env:
          # Для Ollama ключ обычно не нужен, но LiteLLM может требовать любую строку
          OPENAI_KEY: "ollama"
          # Прямое указание базы именно для Ollama
          OLLAMA.API_BASE: "https://62eb7e9a45ce38.lhr.life"
#          OLLAMA__API_BASE: "https://ed6e67aac74e0b.lhr.life"
          # Обязательный префикс 'ollama/' перед названием модели
          CONFIG.MODEL: "ollama/qwen-32k"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG.FALLBACK_MODELS: "[]"
          CONFIG.MAX_CONTEXT_TOKENS: 32768
          CONFIG.MODEL_MAX_TOKENS: 32768
#          # Включает автоматическое описание при пуше новых коммитов
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "true"
#          # Включает автоматическое ревью при пуше новых коммитов
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: "true"
          CONFIG.DUPLICATE_EXAMPLES: "true"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "32768" # Поднимите до 8к минимум
          LITELLM_LOG: "DEBUG"
#          # Включение дебага
          LOG_LEVEL: "DEBUG"
          LITELLM_REQUEST_TIMEOUT: "600" # Тайм-аут в секундах (например, 10 минут)
#          # Или через конфиг PR-Agent
          CONFIG.LITELLM.REQUEST_TIMEOUT: "600"
#          # --- ДОБАВИТЬ ЭТИ СТРОКИ ---
          CONFIG.AI_TIMEOUT: "600"
          CONFIG.LITELLM.PARAMS.TIMEOUT: "600"
#          # ---------------------------
          CONFIG.LITELLM.PARAMS.STREAM: "true"
          CONFIG__AI_TIMEOUT: "600"
          CONFIG__LITELLM__PARAMS__TIMEOUT: "600"
          CONFIG__LITELLM__PARAMS__STREAM: "true"
          CONFIG.PATCH_EXTRA_LINES_BEFORE: 100
          CONFIG.PATCH_EXTRA_LINES_AFTER: 100
          # Добавляем инструкции ниже:
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            - Verify that all new methods and classes have unit tests (JUnit/TestNG).
            - Ensure there are no hardcoded API keys, secrets, or database credentials.
            - Check for proper resource management (e.g., use of try-with-resources for Streams/IO).
            - Verify adherence to Java naming conventions (PascalCase for classes, camelCase for methods/variables).
            - Ensure that Exception handling is specific, not just catching generic 'Exception' or 'Throwable'.
            - ALL static variables must be in UPPER_CASE. If you see a static variable in lower case or camelCase, flag it as a naming violation.
            - Start every review with the phrase: "TEST MODE ACTIVE: Java Standards Check."
            - @Tag annotations should not use russian language
          PR_CODE_SUGGESTIONS.EXTRA_INSTRUCTIONS: |
            - Focus on critical performance issues, thread safety, and memory leaks.
            - Suggest modern Java features (Java 11/17/21) where appropriate (e.g., Optional, Records, Lambdas).
            - Avoid nitpicking on minor style issues if they don't break functionality.
            - If a static variable is not UPPER_CASE, suggest a rename.
            - Add a comment: "Note: Static naming rule applied."
            - if @Tag annotations has russian language suggest to change it to english
